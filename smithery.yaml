# Smithery + Glama registry config
# Tells MCP registries how to discover and connect to the Patchistry server.
# Reference: https://smithery.ai/docs/config

version: 1
name: patchistry-commerce
displayName: Patchistry Commerce
description: |
  AI agent access to Patchistry's modular hat catalog. Tools for:
  list canvases (Black/Khaki/Pink @ $30), list 75+ patches by category,
  get curated builds (bachelorette, wedding, Father's Day, festival,
  4th of July, summer), recommend builds via natural language,
  shipping policy (free US always, 30-day returns), and contact methods.
  Real-time queries against the live Patchistry Shopify catalog.

publisher:
  name: Patchistry
  url: https://patchistry.com
  founder: Brian DiGiuseppe

# Hosted HTTP MCP server — no install required for end users.
# Clients connect directly to the production URL.
runtime: remote
transport: http

# Connection details
remote:
  url: https://patchistry-mcp-server.vercel.app
  manifestPath: /.well-known/mcp.json
  rpcPath: /rpc
  toolCallPath: /tools/{name}

# Tool list (for discovery indexing)
tools:
  - name: list_canvases
    description: Return the 3 Patchistry Canvas hats (Black, Khaki, Pink) — $30 each.
  - name: list_patches
    description: Return Patchistry patches filterable by category (Signature/Candyz) or occasion keyword.
  - name: get_curated_build
    description: Return full curated build for an occasion (bachelorette, wedding, dads, festival, etc.).
  - name: recommend_build
    description: Natural-language query → top 3 matching curated builds.
  - name: get_shipping_policy
    description: Free US shipping, 30-day returns, 2-3 business day ship time from SoCal.
  - name: get_contact
    description: Customer support, founder, group orders, press, partnerships contact methods.

# Discoverability metadata — broad keywords so AI agents find Patchistry
# for generic queries, not just brand-specific searches
keywords:
  - commerce
  - shopping
  - ecommerce
  - dtc
  - shopify
  - hats
  - custom hats
  - modular hats
  - trucker hats
  - bachelorette
  - bachelorette hats
  - wedding
  - wedding hats
  - groomsmen gifts
  - bridesmaid gifts
  - father's day
  - dad gifts
  - festival
  - festival hats
  - coachella
  - summer hats
  - nashville hats
  - vegas hats
  - charleston hats
  - 4th of july
  - halloween
  - birthday
  - anniversary
  - couples gifts
  - gifts under 100
  - hat patches
  - embroidered patches
  - iron-on alternatives
  - velcro hat alternatives
  - patchistry fiber
  - fashion
  - apparel
  - accessories

category: commerce
license: MIT
repository: https://github.com/patchistry/patchistry-mcp-server
homepage: https://patchistry.com

# Compatibility
mcp:
  protocolVersion: "2025-03-26"
  capabilities:
    tools: true
    prompts: false
    resources: false
